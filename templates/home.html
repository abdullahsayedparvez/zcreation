<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZCreation - Home</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e2cfc1, #d1b094); /* Light brown gradient */
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative; /* Required for the circle to follow the cursor */
        }
        .container {
            text-align: center;
            background-color: #fff;
            border-radius: 15px;
            padding: 30px 50px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            margin: 20px;
        }
        h1 {
            color: #6f4f37; /* A warm brown color for the title */
            font-size: 36px;
            margin-bottom: 20px;
        }
        p {
            color: #6f4f37;
            font-size: 18px;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #6f4f37; /* Dark brown background */
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        a:hover {
            background-color: #4a3624; /* Slightly darker brown for hover */
            transform: scale(1.05);
        }
        .navbar {
            background-color: #6f4f37;
            overflow: hidden;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            padding: 10px 0;
            z-index: 10;
        }
        .navbar a {
            float: left;
            padding: 14px 20px;
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
        }
        .navbar a:hover {
            background-color: #4a3624;
            color: white;
        }
        .navbar .logout {
            float: right;
        }
        .content {
            padding-top: 70px; /* Space for the navbar */
        }
        
        /* Circle style */
        .cursor-circle {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #6f4f37;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%); /* Center the circle */
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'settings' %}">Settings</a>
        <a href="{% url 'logout' %}" class="logout">Logout</a>
    </div>

    <div class="container content">
        <h1>Welcome to ZCreation!</h1>
        <p>Explore the various sections using the navigation bar above. Customize your experience with our tools and features.</p>
        <a href="{% url 'dashboard' %}">Go to Dashboard</a>
    </div>

    <!-- Cursor Circle -->
    <div class="cursor-circle" id="cursor-circle"></div>

    <script>
        // JavaScript for the cursor circle effect with delay
        const cursorCircle = document.getElementById('cursor-circle');
        
        let mouseX = 0, mouseY = 0; // Current mouse position
        let circleX = 0, circleY = 0; // Position of the circle

        // Update mouse position on mousemove
        document.addEventListener('mousemove', (event) => {
            mouseX = event.pageX;
            mouseY = event.pageY;
        });

        // Animation function to move the circle with a delay
        function animateCursor() {
            // Slowly move the circle towards the mouse position
            circleX += (mouseX - circleX) * 0.1; // 0.1 controls the speed of the delay
            circleY += (mouseY - circleY) * 0.1; // 0.1 controls the speed of the delay

            // Update the circle's position
            cursorCircle.style.left = circleX + 'px';
            cursorCircle.style.top = circleY + 'px';

            requestAnimationFrame(animateCursor); // Continue animating
        }

        // Start the animation
        animateCursor();
    </script>
</body>
</html>
