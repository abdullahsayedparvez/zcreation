<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact Us - ZCreation</title>
    {% load static %}
    <style>
      /* Reset and base */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #f7efe5, #d1b094);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #6f4f37;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Navbar */
      .navbar {
        background-color: #6f4f37;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 3px 6px rgba(111, 79, 55, 0.3);
        position: fixed;
        width: 100%;
        top: 0;
        left: 0;
        z-index: 1000;
      }

      .navbar a {
        color: white;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        padding: 8px 16px;
        border-radius: 8px;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .navbar a:hover {
        background-color: white;
        color: #6f4f37;
        box-shadow: 0 2px 8px rgba(111, 79, 55, 0.2);
      }

      /* Main container */
      .container {
        max-width: 800px; /* increased from 600px */
        background: white;
        border-radius: 15px;
        padding: 40px 30px;
        margin: 100px auto 60px; /* keep top margin for navbar */
        box-shadow: 0 10px 30px rgba(111, 79, 55, 0.15);
        flex-grow: 1;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 30px;
        font-weight: 700;
        text-align: center;
        color: #6f4f37;
      }

      /* Form styling */
      form {
        display: flex;
        flex-direction: column;
        gap: 25px;
      }

      label {
        font-weight: 600;
        margin-bottom: 8px;
        display: inline-block;
        color: #4a3624;
      }

      input[type="text"],
      input[type="email"],
      textarea {
        width: 100%;
        padding: 14px 18px;
        font-size: 16px;
        border: 2px solid #d1b094;
        border-radius: 12px;
        outline-offset: 2px;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
        font-family: inherit;
        color: #4a3624;
        resize: vertical;
      }
      input[type="text"]:focus,
      input[type="email"]:focus,
      textarea:focus {
        border-color: #6f4f37;
        box-shadow: 0 0 8px rgba(111, 79, 55, 0.4);
      }

      textarea {
        min-height: 140px;
      }

      button {
        background-color: #6f4f37;
        color: white;
        font-weight: 700;
        font-size: 18px;
        padding: 14px 0;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(111, 79, 55, 0.3);
        transition: background-color 0.3s ease, box-shadow 0.3s ease;
      }
      button:hover {
        background-color: #4a3624;
        box-shadow: 0 8px 20px rgba(74, 54, 36, 0.7);
      }

      /* Responsive */
      @media (max-width: 640px) {
        .container {
          margin: 80px 20px 40px;
          padding: 30px 20px;
          max-width: 100%; /* ensure full width on small devices */
        }
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <a href="{% url 'home' %}">&#8592; Back</a>
      <a href="{% url 'logout' %}">Logout</a>
    </div>

    <div class="container">
      <h1>Contact Us</h1>
      <form method="post">
        {% csrf_token %}
        <div>
          <label for="name">Name</label>
          <input
            id="name"
            name="name"
            type="text"
            placeholder="Your full name"
            required
          />
        </div>
        <div>
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>
        <div>
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            placeholder="Write your message here..."
            required
          ></textarea>
        </div>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </body>
</html>
